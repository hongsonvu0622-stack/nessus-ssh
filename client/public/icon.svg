<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Dark Obsidian Squircle Base -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#181c26" />
      <stop offset="50%" stop-color="#0f1118" />
      <stop offset="100%" stop-color="#090a0f" />
    </linearGradient>

    <!-- Metallic N Face -->
    <linearGradient id="metalN" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#242938" />
      <stop offset="50%" stop-color="#151821" />
      <stop offset="100%" stop-color="#0a0c12" />
    </linearGradient>

    <!-- Glowing Cyan & Violet Laser Edges -->
    <linearGradient id="laserCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="laserViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Squircle Base -->
  <rect width="480" height="480" x="16" y="16" rx="112" fill="url(#bgGrad)" stroke="#2d3548" stroke-width="6" />

  <!-- Pure Bold Geometric Letter N -->
  <g filter="url(#neonGlow)">
    <!-- Left Vertical Column (Cyan Glow) -->
    <path d="M104 396 V116 L176 116 L176 396 Z" fill="url(#metalN)" stroke="url(#laserCyan)" stroke-width="6" stroke-linejoin="round" />
    
    <!-- Diagonal Nexus Bridge (Cyan -> Violet Transition) -->
    <path d="M164 116 L348 396 L284 396 L104 116 Z" fill="url(#metalN)" stroke="url(#laserCyan)" stroke-width="5" stroke-linejoin="round" opacity="0.95" />
    
    <!-- Right Vertical Column (Violet Glow) -->
    <path d="M336 396 V116 L408 116 L408 396 Z" fill="url(#metalN)" stroke="url(#laserViolet)" stroke-width="6" stroke-linejoin="round" />
  </g>
</svg>
